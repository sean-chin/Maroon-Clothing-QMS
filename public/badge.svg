  <ellipse cx="150" cy="75" rx="112" ry="42" fill="none" stroke="#efe6da" stroke-width="2.5" opacity="0.7"/>
  <text x="150" y="88" text-anchor="middle"
        font-family="Times New Roman, serif" font-weight="bold" font-size="38"
        letter-spacing="3" fill="#efe6da">MAROON</text>
</svg>
